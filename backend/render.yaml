services:
  - type: web
    name: einsight-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SCRAPER_URL
        value: https://einsight-scraper.onrender.com
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: BATCH_SIZE
        value: 20
      - key: CORS_EXTRA_ORIGINS
        sync: false
